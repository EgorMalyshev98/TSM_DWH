link: |
    {{{{
        config(
            materialized='incremental',
            incremental_strategy='append',
            tags=['link', '{source}']
        )
    }}}}

    SELECT distinct on ({parent_hkeys})
            {hk_name},
            hkcode,
            recsource,
            loadts,
            {parent_hkeys}
    FROM {{{{ ref('{stg_table}') }}}} stg

    {{% if is_incremental() %}}
    where not exists (
        select 1
        from {{{{this}}}} target
        where
            target.{hk_name} = stg.{hk_name}
    )
    {{% endif %}}
